<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WETEN WAAR.</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a;
  --red: #e63928;
  --cream: #f0ebe3;
  --white: #fafaf8;
  --gray: #6b6660;
  --gray-light: #a39e96;
  --pink: #e88cb4;
  --green: #1a8a5c;
  --ink: #1a1817;
  --ink-mid: #4a4540;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--black);
  color: var(--cream);
  overflow-x: hidden;
  font-weight: 300;
}
::selection { background: var(--red); color: var(--white); }

/* ═══ ANIMATED STRIPES BACKGROUND (hero only) ═══ */
.stripes-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.stripes-bg .stripe {
  position: absolute;
  top: -100%;
  width: calc(100% / 14);
  height: 300%;
  will-change: transform;
}
.stripes-bg .stripe:nth-child(odd)  { background: var(--pink); }
.stripes-bg .stripe:nth-child(even) { background: var(--green); }

.stripes-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  pointer-events: none;
  background: rgba(10, 10, 10, 0.88);
  transition: opacity 0.5s;
}

body > *:not(.stripes-bg):not(.stripes-overlay) {
  position: relative;
  z-index: 2;
}

/* ═══ NAV ═══ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.2rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  mix-blend-mode: difference;
}
nav .logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 0.15em;
  color: var(--white);
  text-decoration: none;
}
nav .links { display: flex; gap: 2rem; }
nav .links a {
  color: var(--white);
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 400;
  transition: opacity 0.3s;
}
nav .links a:hover { opacity: 0.5; }

/* ═══ HERO ═══ */
.hero {
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 6rem 2rem 4rem;
  position: relative;
}
.hero-label {
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 1.5rem;
  font-weight: 500;
}
.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(5rem, 15vw, 14rem);
  line-height: 0.85;
  letter-spacing: -0.02em;
  color: var(--cream);
}
.hero h1 span {
  color: var(--red);
  display: block;
}
.hero .sub {
  margin-top: 2rem;
  font-size: 1.1rem;
  color: var(--gray-light);
  max-width: 400px;
  line-height: 1.6;
}
.hero .scroll-hint {
  position: absolute;
  bottom: 2.5rem;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ═══ STRIPE BAND MARQUEE ═══ */
.stripe-band {
  height: 90px;
  overflow: hidden;
  position: relative;
}
.stripe-band .band-inner {
  display: flex;
  height: 100%;
  width: 200%;
}
.stripe-band .band-stripe {
  flex: 0 0 calc(100% / 28);
  height: 100%;
}
.stripe-band .band-stripe:nth-child(odd)  { background: var(--pink); }
.stripe-band .band-stripe:nth-child(even) { background: var(--green); }
.stripe-band .band-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.8rem, 4vw, 3.2rem);
  color: var(--black);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
}
.stripe-band .band-text span {
  display: inline-block;
  animation: marquee 12s linear infinite;
}
.band-spotify {
  position: absolute;
  right: 1.5rem;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.band-spotify iframe {
  display: block;
  border-radius: 12px;
  height: 80px;
  width: 300px;
}
@keyframes marquee {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ═══ LIGHT CONTENT AREA ═══ */
.content-area {
  background: var(--cream);
  color: var(--ink);
  position: relative;
  z-index: 2;
}

/* ═══ MAP ═══ */
.map-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2.5rem 1rem 1.5rem;
}
.map-section .section-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  color: var(--ink);
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
}
#map {
  width: 100%; height: 420px;
  border-radius: 10px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.08);
}
.leaflet-control-attribution { display: none !important; }
.leaflet-control-zoom { display: none !important; }

/* ═══ FILTERS ═══ */
.filters-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1rem 0;
}
.filter-row {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  margin-bottom: 0.8rem;
}
.filter-row button {
  padding: 0.35rem 0.9rem; border-radius: 20px;
  border: 1px solid #d5d0ca; background: var(--white);
  font-family: 'Outfit', sans-serif; font-size: 0.78rem;
  color: var(--ink-mid); cursor: pointer; transition: all 0.2s;
  font-weight: 400;
}
.filter-row button:hover, .filter-row button.active {
  background: var(--green); color: var(--white); border-color: var(--green);
}
/* Wijk filters — groot en bold */
.filter-row.area-row {
  gap: 0.6rem;
  margin-bottom: 1.2rem;
}
.filter-row.area-row button {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.06em;
  padding: 0.3rem 1.4rem;
  border-radius: 6px;
  border: 2px solid var(--ink);
  background: transparent;
  color: var(--ink);
  text-transform: uppercase;
}
.filter-row.area-row button:hover {
  background: var(--ink);
  color: var(--cream);
  border-color: var(--ink);
}
.filter-row.area-row button.active {
  background: var(--green);
  color: var(--white);
  border-color: var(--green);
}

/* ═══ CARDS ═══ */
.cards-section {
  max-width: 1200px; margin: 0 auto; padding: 1.2rem 1rem 3rem;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0.8rem;
}
.card {
  background: var(--white);
  border-radius: 8px;
  padding: 1rem 1.2rem; cursor: pointer;
  border: 1px solid #e8e3dd;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.15rem; }
.card h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400; font-size: 1.2rem;
  color: var(--ink); line-height: 1.3;
  letter-spacing: 0.04em;
}
.card .note {
  font-size: 0.8rem; color: var(--ink-mid);
  margin-bottom: 0.4rem; line-height: 1.4;
  font-style: italic;
}
.card .meta {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  font-size: 0.72rem; color: var(--gray);
}
.card .meta span { display: inline-flex; align-items: center; gap: 0.2rem; }
.card .tag {
  display: inline-block; padding: 0.12rem 0.45rem; border-radius: 10px;
  background: #f0ebe3; font-size: 0.68rem; color: var(--ink-mid);
}
.card .link {
  display: inline-block; margin-top: 0.5rem;
  font-size: 0.75rem; color: var(--green);
  text-decoration: none; font-weight: 500;
  letter-spacing: 0.03em; transition: color 0.2s;
}
.card .link:hover { color: var(--pink); }
.card .nav-btn {
  display: inline-flex; align-items: center; gap: 0.3rem;
  margin-top: 0.5rem; margin-left: 0.5rem;
  padding: 0.3rem 0.7rem; border-radius: 14px;
  background: var(--green); color: var(--white);
  font-size: 0.72rem; font-weight: 500; font-family: 'Outfit', sans-serif;
  text-decoration: none; letter-spacing: 0.02em;
  transition: background 0.2s;
}
.card .nav-btn:hover { background: var(--pink); }
.card .actions { display: flex; align-items: center; flex-wrap: wrap; }
.card.hidden { display: none; }

/* ═══ LEAFLET POPUP ═══ */
.leaflet-popup-content-wrapper { border-radius: 6px !important; font-family: 'Outfit', sans-serif; box-shadow: 0 3px 12px rgba(0,0,0,0.12) !important; }
.leaflet-popup-content { margin: 10px 14px !important; line-height: 1.4 !important; }
.p-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; font-weight: 400; color: var(--ink); letter-spacing: 0.04em; }
.p-note { font-size: 0.78rem; color: var(--ink-mid); margin-top: 2px; }

/* ═══ GEEN IDEE SPINNER ═══ */
.spinner-section {
  padding: 3rem 1rem;
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
}
.spinner-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 7vw, 4.5rem);
  color: var(--ink);
  letter-spacing: 0.04em;
  line-height: 0.9;
  margin-bottom: 0.3rem;
}
.spinner-title span { color: var(--red); }
.spinner-sub {
  font-size: 0.9rem;
  color: var(--gray);
  margin-bottom: 2rem;
}
.spinner-persons {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.spinner-persons label {
  font-size: 0.85rem;
  color: var(--ink-mid);
  font-weight: 400;
}
.spinner-persons .person-btns {
  display: flex; gap: 0.3rem;
}
.spinner-persons .person-btns button {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 2px solid var(--ink);
  background: transparent;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.2s;
}
.spinner-persons .person-btns button.selected {
  background: var(--ink);
  color: var(--cream);
}
.spinner-persons .person-btns button:hover {
  background: var(--green);
  color: var(--white);
  border-color: var(--green);
}
/* Slot reel */
.slot-wrapper {
  position: relative;
  height: 80px;
  overflow: hidden;
  border-radius: 8px;
  border: 2px solid var(--ink);
  margin-bottom: 1.5rem;
  background: var(--white);
}
.slot-wrapper::before, .slot-wrapper::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 20px;
  z-index: 2;
  pointer-events: none;
}
.slot-wrapper::before {
  top: 0;
  background: linear-gradient(to bottom, var(--white), transparent);
}
.slot-wrapper::after {
  bottom: 0;
  background: linear-gradient(to top, var(--white), transparent);
}
.slot-reel {
  position: absolute;
  left: 0; right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.1s linear;
}
.slot-item {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 0.06em;
  color: var(--ink);
  white-space: nowrap;
  flex-shrink: 0;
}
.slot-item .slot-area {
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  color: var(--gray);
  margin-left: 0.6rem;
  font-weight: 400;
  letter-spacing: 0;
}
/* Spin button */
.spin-btn {
  display: inline-block;
  padding: 0.8rem 2.5rem;
  border-radius: 6px;
  border: none;
  background: var(--red);
  color: var(--white);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}
.spin-btn:hover {
  background: var(--green);
  transform: scale(1.05);
}
.spin-btn:active {
  transform: scale(0.98);
}
.spin-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
/* Result */
.spin-result {
  margin-top: 1.5rem;
  opacity: 0;
  transition: opacity 0.4s;
}
.spin-result.visible { opacity: 1; }
.spin-result .result-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  color: var(--green);
  letter-spacing: 0.04em;
}
.spin-result .result-note {
  font-size: 0.85rem;
  color: var(--ink-mid);
  font-style: italic;
  margin: 0.3rem 0;
}
.spin-result .result-actions {
  display: flex;
  justify-content: center;
  gap: 0.6rem;
  margin-top: 0.8rem;
}
.spin-result .result-actions a {
  padding: 0.4rem 1rem;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.2s;
}
.spin-result .result-nav {
  background: var(--green);
  color: var(--white);
}
.spin-result .result-nav:hover { background: var(--pink); }
.spin-result .result-retry {
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  cursor: pointer;
}
.spin-result .result-retry:hover {
  background: var(--ink);
  color: var(--cream);
}
.spinner-divider {
  max-width: 1200px;
  margin: 0 auto;
  border: none;
  border-top: 1px solid #e0dbd5;
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  nav .links { display: none; }
  .hero h1 { font-size: clamp(4rem, 18vw, 8rem); }
  .hero .sub { font-size: 1rem; padding: 0 1rem; }
  .stripe-band { height: 80px; }
  .band-spotify { right: 0.5rem; }
  .band-spotify iframe { width: 200px; height: 80px; }
  .stripe-band .band-text { font-size: 1.2rem; }
}
@media (max-width: 600px) {
  #map { height: 280px; border-radius: 8px; }
  .cards { grid-template-columns: 1fr; }
  .map-section { padding: 1.5rem 0.6rem 1rem; }
  .filters-section { padding: 1.2rem 0.6rem 0; }
  .cards-section { padding: 1rem 0.6rem 2rem; }
  /* Spinner mobile */
  .spinner-section { padding: 2rem 0.8rem; }
  .spinner-title { font-size: clamp(2rem, 10vw, 3.5rem); }
  .slot-item {
    font-size: 1.3rem;
    height: 60px;
  }
  .slot-wrapper { height: 60px; }
  .slot-item .slot-area { font-size: 0.65rem; margin-left: 0.4rem; }
  .spinner-persons .person-btns button {
    width: 38px; height: 38px;
    font-size: 1.1rem;
  }
  .spin-btn { font-size: 1.4rem; padding: 0.7rem 2rem; }
  .spin-result .result-name { font-size: 1.7rem; }
  /* Filter buttons mobile */
  .filter-row.area-row button {
    font-size: 1.2rem;
    padding: 0.25rem 1rem;
  }
  .filter-row button {
    font-size: 0.72rem;
    padding: 0.3rem 0.7rem;
  }
  /* Cards mobile */
  .card { padding: 1rem; }
  .card h3 { font-size: 1.1rem; }
  .card .note { font-size: 0.78rem; }
  .card .nav-btn { font-size: 0.68rem; padding: 0.25rem 0.6rem; }
  .card .actions { gap: 0.3rem; }
  /* Nav mobile */
  nav { padding: 1rem 1.2rem; }
  nav .logo { font-size: 1.4rem; }
  /* Hero mobile */
  .hero { padding: 5rem 1.5rem 3rem; min-height: 100svh; }
  .hero-label { font-size: 0.65rem; letter-spacing: 0.2em; }
  .scroll-hint { bottom: 2rem; }
  .band-spotify { right: 50%; transform: translate(50%, -50%); }
  .band-spotify iframe { width: 250px; }
}
</style>
</head>
<body>

<!-- ═══ STRIPES ACHTERGROND ═══ -->
<div class="stripes-bg" id="stripesBg"></div>
<div class="stripes-overlay" id="stripesOverlay"></div>

<!-- ═══ NAV ═══ -->
<nav>
  <a class="logo" href="#">WETEN WAAR.</a>
  <div class="links">
    <a href="#geen-idee">Geen Idee?</a>
    <a href="#kaart">Kaart</a>
    <a href="#plekken">Plekken</a>
  </div>
</nav>

<!-- ═══ HERO ═══ -->
<section class="hero">
  <h1>WETEN<span>WAAR.</span></h1>
  <p class="sub">Geen algoritme. Geen influencers. Gewoon plekken waar wij &eacute;cht komen.</p>
  <div class="scroll-hint">&darr; Scroll</div>
</section>

<!-- ═══ STRIPE BAND WITH SPOTIFY ═══ -->
<div class="stripe-band">
  <div class="band-inner" id="bandInner1"></div>
  <div class="band-text">
    <span>ETEN &nbsp;&middot;&nbsp; DRINKEN &nbsp;&middot;&nbsp; AMSTERDAM &nbsp;&middot;&nbsp; ETEN &nbsp;&middot;&nbsp; DRINKEN &nbsp;&middot;&nbsp; AMSTERDAM &nbsp;&middot;&nbsp; ETEN &nbsp;&middot;&nbsp; DRINKEN &nbsp;&middot;&nbsp; AMSTERDAM &nbsp;&middot;&nbsp; </span>
  </div>
  <div class="band-spotify">
    <iframe src="https://open.spotify.com/embed/track/4Tzw9IdZbVyzmpWrvsGaNX?utm_source=generator&theme=0" width="300" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media" loading="lazy"></iframe>
  </div>
</div>

<!-- ═══ LIGHT CONTENT ═══ -->
<div class="content-area">

  <!-- KAART -->
  <div class="map-section" id="kaart">
    <div id="map"></div>
  </div>

  <!-- GEEN IDEE SPINNER -->
  <hr class="spinner-divider">
  <div class="spinner-section" id="geen-idee">
    <div class="spinner-title">GEEN IDEE<span>?</span></div>
    <p class="spinner-sub">Wij kiezen voor je. Hoeveel zijn jullie?</p>
    <div class="spinner-persons">
      <div class="person-btns" id="personBtns">
        <button data-n="1">1</button>
        <button data-n="2" class="selected">2</button>
        <button data-n="3">3</button>
        <button data-n="4">4</button>
        <button data-n="5">5+</button>
      </div>
    </div>
    <div class="slot-wrapper">
      <div class="slot-reel" id="slotReel"></div>
    </div>
    <button class="spin-btn" id="spinBtn">DRAAI</button>
    <div class="spin-result" id="spinResult">
      <div class="result-name" id="resultName"></div>
      <div class="result-note" id="resultNote"></div>
      <div class="result-actions" id="resultActions"></div>
    </div>
  </div>
  <hr class="spinner-divider">

  <!-- FILTERS + CARDS -->
  <div class="filters-section" id="plekken">
    <div class="filter-row area-row" id="area-filters"></div>
    <div class="filter-row" id="filters"></div>
  </div>
  <div class="cards-section">
    <div class="cards" id="cards"></div>
  </div>

</div>

<script>
// ═══ GENERATE STRIPES ═══
const stripesBg = document.getElementById('stripesBg');
for (let i = 0; i < 14; i++) {
  const s = document.createElement('div');
  s.className = 'stripe';
  s.style.left = `${(i / 14) * 100}%`;
  s.dataset.offset = i % 2 === 0 ? -50 : -150;
  s.dataset.speed = (0.15 + Math.random() * 0.1).toFixed(3);
  stripesBg.appendChild(s);
}
const bandEl = document.getElementById('bandInner1');
for (let i = 0; i < 28; i++) {
  const s = document.createElement('div');
  s.className = 'band-stripe';
  bandEl.appendChild(s);
}

// ═══ SCROLL PARALLAX ═══
const overlay = document.getElementById('stripesOverlay');
let ticking = false;
function onScroll() {
  if (ticking) return;
  ticking = true;
  requestAnimationFrame(() => {
    const scrollY = window.scrollY;
    const vh = window.innerHeight;
    stripesBg.querySelectorAll('.stripe').forEach(s => {
      const offset = parseFloat(s.dataset.offset);
      const speed = parseFloat(s.dataset.speed);
      s.style.transform = `translateY(${offset + scrollY * speed}px)`;
    });
    const heroEnd = vh * 0.8;
    if (scrollY < heroEnd) {
      overlay.style.opacity = 0.5 + (scrollY / heroEnd) * 0.42;
    } else {
      overlay.style.opacity = 0.92;
    }
    ticking = false;
  });
}

  'Centrum': ['Centrum', 'Zeedijk', 'Nieuwmarkt'],

const overigAreas = [...new Set(places.map(p => p.area))].filter(a => !Object.values(areaGroups).flat().includes(a));

  const btn = document.createElement('button');

const allTags = [...new Set(places.flatMap(p => p.tags))].sort();
const tagLabels = { restaurant:'Restaurant', bar:'Bar', tapas:'Tapas', wijn:'Wijn', italiaans:'Italiaans', frans:'Frans', vis:'Vis', oesters:'Oesters', cocktails:'Cocktails', brunch:'Brunch', lunch:'Lunch', terras:'Terras', borrel:'Borrel', ontbijt:'Ontbijt', 'happy hour':'Happy Hour', steak:'Steak', snacks:'Snacks', kaas:'Kaas', pasta:'Pasta', '\u20ac\u20ac\u20ac':'\u20ac\u20ac\u20ac', chic:'Chic' };
const filtersEl = document.getElementById('filters');

allBtn.textContent = 'Alles';
allBtn.className = 'active';
allBtn.onclick = () => { activeTag = null; applyFilters(); };
filtersEl.appendChild(allBtn);
const showTags = ['restaurant','bar','italiaans','frans','tapas','wijn','oesters','vis','cocktails','brunch','lunch','terras','steak','ontbijt','happy hour'];
showTags.forEach(tag => {
  if (!allTags.includes(tag)) return;
  const btn = document.createElement('button');
  btn.textContent = tagLabels[tag] || tag;
  btn.onclick = () => { activeTag = tag; applyFilters(); };
  filtersEl.appendChild(btn);
});

function applyFilters() {
  [...areaFiltersEl.children].forEach(b => b.classList.remove('active'));
  if (!activeArea) {
    areaFiltersEl.children[0].classList.add('active');
  } else {
    [...areaFiltersEl.children].find(b => b.textContent === activeArea)?.classList.add('active');
  }
  [...filtersEl.children].forEach(b => b.classList.remove('active'));
  if (!activeTag) {
    filtersEl.children[0].classList.add('active');
  } else {
    [...filtersEl.children].find(b => b.textContent === (tagLabels[activeTag]||activeTag))?.classList.add('active');
  }
  document.querySelectorAll('.card').forEach((card, i) => {
    const matchArea = !activeArea || areaGroups[activeArea].includes(places[i].area);
    const matchTag = !activeTag || places[i].tags.includes(activeTag);
    card.classList.toggle('hidden', !(matchArea && matchTag));
  });
  // Zoom kaart naar geselecteerde wijk
  if (activeArea) {
    const areaPlaces = places.filter(p => areaGroups[activeArea].includes(p.area));
    if (areaPlaces.length) {
      const areaBounds = areaPlaces.map(p => [p.lat, p.lng]);
      map.fitBounds(areaBounds, { padding: [60, 60], maxZoom: 15 });
    }
  } else {
    map.fitBounds(bounds, { padding: [30, 30] });
  }
}

const slotReel = document.getElementById('slotReel');
const spinBtn = document.getElementById('spinBtn');
const spinResult = document.getElementById('spinResult');
const resultName = document.getElementById('resultName');
const resultNote = document.getElementById('resultNote');
const resultActions = document.getElementById('resultActions');

// Build reel with shuffled names
function buildReel() {
  slotReel.innerHTML = '';
  const shuffled = [...places].sort(() => Math.random() - 0.5);
  // Repeat list 3x for smooth scrolling effect
  const reelPlaces = [...shuffled, ...shuffled, ...shuffled];
  reelPlaces.forEach(p => {
    const item = document.createElement('div');
    item.className = 'slot-item';
    item.innerHTML = `${p.name} <span class="slot-area">${p.area}</span>`;
    slotReel.appendChild(item);
  });
  slotReel.style.transform = 'translateY(0)';
  return shuffled;
}

let isSpinning = false;
buildReel();

spinBtn.onclick = () => {
  if (isSpinning) return;
  isSpinning = true;
  spinBtn.disabled = true;
  spinResult.classList.remove('visible');

  const shuffled = buildReel();
  const winnerIndex = Math.floor(Math.random() * places.length);
  const winner = shuffled[winnerIndex];

  // Target position: land on winner in the second set (for smooth scroll)
  const itemHeight = window.innerWidth <= 600 ? 60 : 80;
  const targetIndex = places.length + winnerIndex;
  const targetY = -(targetIndex * itemHeight);

  // Animate: fast start, ease out
  let startTime = null;
  const duration = 3000 + Math.random() * 1000;
  const startY = 0;

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeOutCubic(progress);
    const currentY = startY + (targetY - startY) * eased;
    slotReel.style.transform = `translateY(${currentY}px)`;

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      // Done!
      isSpinning = false;
      spinBtn.disabled = false;
      resultName.textContent = winner.name;
      resultNote.textContent = winner.note || winner.area;
      resultActions.innerHTML = `
        <a class="result-nav" href="https://www.google.com/maps/dir/?api=1&destination=${winner.lat},${winner.lng}" target="_blank" rel="noopener">\u2794 Breng me hier</a>
        <button class="result-retry" onclick="document.getElementById('spinBtn').click()">Nee, opnieuw</button>
      `;
      spinResult.classList.add('visible');

      // Zoom map
      map.setView([winner.lat, winner.lng], 16, { animate: true });
      const idx = places.indexOf(winner);
      if (idx >= 0) markers[idx].openPopup();
    }
  }

  requestAnimationFrame(animate);
};
</script>
