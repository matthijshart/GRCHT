<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a;
  --red: #e63928;
  --cream: #f0ebe3;
  --white: #fafaf8;
  --gray: #6b6660;
  --gray-light: #a39e96;
  --pink: #e88cb4;
  --green: #1a8a5c;
  --ink: #1a1817;
  --ink-mid: #4a4540;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--black);
  color: var(--cream);
  overflow-x: hidden;
  font-weight: 300;
}
::selection { background: var(--red); color: var(--white); }

/* ═══ ANIMATED STRIPES BACKGROUND (hero only) ═══ */
.stripes-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.stripes-bg .stripe {
  position: absolute;
  top: -100%;
  width: calc(100% / 14);
  height: 300%;
  will-change: transform;
}
.stripes-bg .stripe:nth-child(odd)  { background: var(--pink); }
.stripes-bg .stripe:nth-child(even) { background: var(--green); }

.stripes-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  pointer-events: none;
  background: rgba(10, 10, 10, 0.88);
  transition: opacity 0.5s;
}

body > *:not(.stripes-bg):not(.stripes-overlay) {
  position: relative;
  z-index: 2;
}

/* ═══ NAV ═══ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.2rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  mix-blend-mode: difference;
}
nav .logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 0.15em;
  color: var(--white);
  text-decoration: none;
}
nav .links { display: flex; gap: 2rem; }
nav .links a {
  color: var(--white);
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 400;
  transition: opacity 0.3s;
}
nav .links a:hover { opacity: 0.5; }

/* ═══ HERO ═══ */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 6rem 2rem 4rem;
  position: relative;
}
.hero-label {
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 1.5rem;
  font-weight: 500;
}
.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(5rem, 15vw, 14rem);
  line-height: 0.85;
  letter-spacing: -0.02em;
  color: var(--cream);
}
.hero h1 span {
  color: var(--red);
  display: block;
}
.hero .sub {
  margin-top: 2rem;
  font-size: 1.1rem;
  color: var(--gray-light);
  max-width: 400px;
  line-height: 1.6;
}
.spotify-player {
  margin-top: 2.5rem;
  border-radius: 12px;
  overflow: hidden;
  opacity: 0.85;
  transition: opacity 0.3s;
}
.spotify-player:hover { opacity: 1; }
.spotify-player iframe { display: block; border-radius: 12px; }
.hero .scroll-hint {
  position: absolute;
  bottom: 2.5rem;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ═══ STRIPE BAND MARQUEE ═══ */
.stripe-band {
  height: 100px;
  overflow: hidden;
  position: relative;
}
.stripe-band .band-inner {
  display: flex;
  height: 100%;
  width: 200%;
}
.stripe-band .band-stripe {
  flex: 0 0 calc(100% / 28);
  height: 100%;
}
.stripe-band .band-stripe:nth-child(odd)  { background: var(--pink); }
.stripe-band .band-stripe:nth-child(even) { background: var(--green); }
.stripe-band .band-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.8rem, 4vw, 3.2rem);
  color: var(--black);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
}
.stripe-band .band-text span {
  display: inline-block;
  animation: marquee 12s linear infinite;
}
@keyframes marquee {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ═══ LIGHT CONTENT AREA ═══ */
.content-area {
  background: var(--cream);
  color: var(--ink);
  position: relative;
  z-index: 2;
}

/* ═══ MAP ═══ */
.map-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2.5rem 1rem 1.5rem;
}
.map-section .section-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  color: var(--ink);
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
}
#map {
  width: 100%; height: 420px;
  border-radius: 10px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.08);
}
.leaflet-control-attribution { display: none !important; }

/* ═══ FILTERS ═══ */
.filters-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem 1rem 0;
}
.filter-row {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  margin-bottom: 0.6rem;
}
.filter-row button {
  padding: 0.35rem 0.9rem; border-radius: 20px;
  border: 1px solid #d5d0ca; background: var(--white);
  font-family: 'Outfit', sans-serif; font-size: 0.78rem;
  color: var(--ink-mid); cursor: pointer; transition: all 0.2s;
  font-weight: 400;
}
.filter-row button:hover, .filter-row button.active {
  background: var(--green); color: var(--white); border-color: var(--green);
}

/* ═══ CARDS ═══ */
.cards-section {
  max-width: 1200px; margin: 0 auto; padding: 1.2rem 1rem 3rem;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0.8rem;
}
.card {
  background: var(--white);
  border-radius: 8px;
  padding: 1rem 1.2rem; cursor: pointer;
  border: 1px solid #e8e3dd;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.15rem; }
.card h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400; font-size: 1.2rem;
  color: var(--ink); line-height: 1.3;
  letter-spacing: 0.04em;
}
.card .hearts { color: var(--pink); font-size: 0.8rem; white-space: nowrap; margin-left: 0.5rem; flex-shrink: 0; }
.card .note {
  font-size: 0.8rem; color: var(--ink-mid);
  margin-bottom: 0.4rem; line-height: 1.4;
  font-style: italic;
}
.card .meta {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  font-size: 0.72rem; color: var(--gray);
}
.card .meta span { display: inline-flex; align-items: center; gap: 0.2rem; }
.card .tag {
  display: inline-block; padding: 0.12rem 0.45rem; border-radius: 10px;
  background: #f0ebe3; font-size: 0.68rem; color: var(--ink-mid);
}
.card .link {
  display: inline-block; margin-top: 0.5rem;
  font-size: 0.75rem; color: var(--green);
  text-decoration: none; font-weight: 500;
  letter-spacing: 0.03em; transition: color 0.2s;
}
.card .link:hover { color: var(--pink); }
.card .nav-btn {
  display: inline-flex; align-items: center; gap: 0.3rem;
  margin-top: 0.5rem; margin-left: 0.5rem;
  padding: 0.3rem 0.7rem; border-radius: 14px;
  background: var(--green); color: var(--white);
  font-size: 0.72rem; font-weight: 500; font-family: 'Outfit', sans-serif;
  text-decoration: none; letter-spacing: 0.02em;
  transition: background 0.2s;
}
.card .nav-btn:hover { background: var(--pink); }
.card .actions { display: flex; align-items: center; flex-wrap: wrap; }
.card.hidden { display: none; }

/* ═══ LEAFLET POPUP ═══ */
.leaflet-popup-content-wrapper { border-radius: 6px !important; font-family: 'Outfit', sans-serif; box-shadow: 0 3px 12px rgba(0,0,0,0.12) !important; }
.leaflet-popup-content { margin: 10px 14px !important; line-height: 1.4 !important; }
.p-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; font-weight: 400; color: var(--ink); letter-spacing: 0.04em; }
.p-hearts { color: #e88cb4; font-size: 0.8rem; }
.p-note { font-size: 0.78rem; color: var(--ink-mid); margin-top: 2px; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  nav .links { display: none; }
}
@media (max-width: 600px) {
  #map { height: 300px; }
  .cards { grid-template-columns: 1fr; }
  .map-section { padding-top: 1.5rem; }
}
</style>
</head>

<script>
// ═══ GENERATE STRIPES ═══
const stripesBg = document.getElementById('stripesBg');
for (let i = 0; i < 14; i++) {
  const s = document.createElement('div');
  s.className = 'stripe';
  s.style.left = `${(i / 14) * 100}%`;
  s.dataset.offset = i % 2 === 0 ? -50 : -150;
  s.dataset.speed = (0.15 + Math.random() * 0.1).toFixed(3);
  stripesBg.appendChild(s);
}
const bandEl = document.getElementById('bandInner1');
for (let i = 0; i < 28; i++) {
  const s = document.createElement('div');
  s.className = 'band-stripe';
  bandEl.appendChild(s);
}

// ═══ SCROLL PARALLAX ═══
const overlay = document.getElementById('stripesOverlay');
let ticking = false;
function onScroll() {
  if (ticking) return;
  ticking = true;
  requestAnimationFrame(() => {
    const scrollY = window.scrollY;
    const vh = window.innerHeight;
    stripesBg.querySelectorAll('.stripe').forEach(s => {
      const offset = parseFloat(s.dataset.offset);
      const speed = parseFloat(s.dataset.speed);
      s.style.transform = `translateY(${offset + scrollY * speed}px)`;
    });
    const heroEnd = vh * 0.8;
    if (scrollY < heroEnd) {
      overlay.style.opacity = 0.5 + (scrollY / heroEnd) * 0.42;
    } else {
      overlay.style.opacity = 0.92;
    }
    ticking = false;
  });
}
window.addEventListener('scroll', onScroll, { passive: true });
onScroll();

  { name:"Tia Rosa", area:"Centrum", hearts:0, note:"Tapas aan de Reguliersgracht", lat:52.3643,lng:4.8963, web:"", tags:["tapas","spaans"] },
  { name:"Roest", area:"Oost", hearts:4, note:"Leuk binnen \u2014 industrieel", lat:52.3720,lng:4.9266, web:"", tags:["bar","industrieel"] },
  { name:"No Nonsense", area:"Centrum", hearts:4, note:"Gezellig bruin caf\u00e9", lat:52.3759,lng:4.9027, web:"", tags:["bar","caf\u00e9"] },
];

// ═══ MAP ═══
const map = L.map('map', { scrollWheelZoom: false, attributionControl: false }).setView([52.3676, 4.9041], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);
document.querySelector('.leaflet-tile-pane').style.filter = 'saturate(0.3) contrast(1.05)';

const bounds = [];
const markers = [];
places.forEach((p, i) => {
  const hasHearts = p.hearts > 0;
  const size = hasHearts && p.hearts >= 4 ? 13 : 9;
  const color = hasHearts ? '#e88cb4' : '#1a8a5c';
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 6px rgba(0,0,0,0.25);"></div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2]
  });
  const marker = L.marker([p.lat, p.lng], { icon }).addTo(map);
  const heartStr = p.hearts > 0 ? '\ud83e\ude77'.repeat(p.hearts) : '';
  marker.bindPopup(`
    <div class="p-title">${p.name}</div>
    ${heartStr ? `<div class="p-hearts">${heartStr}</div>` : ''}
    ${p.note ? `<div class="p-note">${p.note}</div>` : ''}
  `, { maxWidth: 220 });
  markers.push(marker);
  bounds.push([p.lat, p.lng]);
});
map.fitBounds(bounds, { padding: [30, 30] });

// ═══ FILTERS ═══
let activeArea = null;
let activeTag = null;

const areaGroups = {
  'Jordaan': ['Jordaan'],
  'De Pijp': ['De Pijp'],
  'Zuid': ['Oud-Zuid'],
  'Centrum': ['Centrum', 'Zeedijk', 'Nieuwmarkt'],
};
const overigAreas = [...new Set(places.map(p => p.area))].filter(a => !Object.values(areaGroups).flat().includes(a));
areaGroups['Overig'] = overigAreas;
const areaFiltersEl = document.getElementById('area-filters');
const allAreaBtn = document.createElement('button');
allAreaBtn.textContent = 'Alle wijken';
allAreaBtn.className = 'active';
allAreaBtn.onclick = () => { activeArea = null; applyFilters(); };
areaFiltersEl.appendChild(allAreaBtn);
['Jordaan','De Pijp','Zuid','Centrum','Overig'].forEach(label => {
  const btn = document.createElement('button');
  btn.textContent = label;
  btn.onclick = () => { activeArea = label; applyFilters(); };
  areaFiltersEl.appendChild(btn);
});

const allTags = [...new Set(places.flatMap(p => p.tags))].sort();
const tagLabels = { restaurant:'Restaurant', bar:'Bar', tapas:'Tapas', wijn:'Wijn', italiaans:'Italiaans', frans:'Frans', vis:'Vis', oesters:'Oesters', cocktails:'Cocktails', brunch:'Brunch', lunch:'Lunch', terras:'Terras', borrel:'Borrel', ontbijt:'Ontbijt', 'happy hour':'Happy Hour', steak:'Steak', snacks:'Snacks', kaas:'Kaas', pasta:'Pasta', '\u20ac\u20ac\u20ac':'\u20ac\u20ac\u20ac', chic:'Chic' };
const filtersEl = document.getElementById('filters');
const allBtn = document.createElement('button');
allBtn.textContent = 'Alles';
allBtn.className = 'active';
allBtn.onclick = () => { activeTag = null; applyFilters(); };
filtersEl.appendChild(allBtn);
const showTags = ['restaurant','bar','italiaans','frans','tapas','wijn','oesters','vis','cocktails','brunch','lunch','terras','steak','ontbijt','happy hour'];
showTags.forEach(tag => {
  if (!allTags.includes(tag)) return;
  const btn = document.createElement('button');
  btn.textContent = tagLabels[tag] || tag;
  btn.onclick = () => { activeTag = tag; applyFilters(); };
  filtersEl.appendChild(btn);
});

function applyFilters() {
  [...areaFiltersEl.children].forEach(b => b.classList.remove('active'));
  if (!activeArea) {
    areaFiltersEl.children[0].classList.add('active');
  } else {
    [...areaFiltersEl.children].find(b => b.textContent === activeArea)?.classList.add('active');
  }
  [...filtersEl.children].forEach(b => b.classList.remove('active'));
  if (!activeTag) {
    filtersEl.children[0].classList.add('active');
  } else {
    [...filtersEl.children].find(b => b.textContent === (tagLabels[activeTag]||activeTag))?.classList.add('active');
  }
  document.querySelectorAll('.card').forEach((card, i) => {
    const matchArea = !activeArea || areaGroups[activeArea].includes(places[i].area);
    const matchTag = !activeTag || places[i].tags.includes(activeTag);
    card.classList.toggle('hidden', !(matchArea && matchTag));
  });
}

// ═══ CARDS ═══
const cardsEl = document.getElementById('cards');
places.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => {
    map.setView([p.lat, p.lng], 16, { animate: true });
    markers[i].openPopup();
    document.getElementById('kaart').scrollIntoView({ behavior: 'smooth' });
  };
  const heartStr = p.hearts > 0 ? '\ud83e\ude77'.repeat(p.hearts) : '';
  card.innerHTML = `
    <div class="card-top">
      <h3>${p.name}</h3>
      ${heartStr ? `<span class="hearts">${heartStr}</span>` : ''}
    </div>
    ${p.note ? `<div class="note">${p.note}</div>` : ''}
    <div class="meta">
      <span>${p.area}</span>
      ${p.tags.map(t => `<span class="tag">${tagLabels[t]||t}</span>`).join('')}
    </div>
    <div class="actions">
      ${p.web ? `<a class="link" href="${p.web}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Website \u2192</a>` : ''}
      <a class="nav-btn" href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}" target="_blank" rel="noopener" onclick="event.stopPropagation()">\u2794 Breng me hier</a>
    </div>
  `;
  cardsEl.appendChild(card);
});
</script>
</body>
</html>
