  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f3f0ec;
      --card: #ffffff;
      --ink: #1a1817;
      --ink-mid: #4a4540;
      --ink-light: #8a837a;
      --accent: #d4627a;
      --accent-soft: #e8a0b0;
      --border: #e5dfda;
      --shadow: rgba(26,24,23,0.06);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }
    /* ── Header ── */
    .header {
      text-align: center;
      padding: 2.5rem 1.5rem 0.8rem;
    }
    .houses-row {
      display: block;
      max-width: 560px;
      margin: 0 auto 0.8rem;
      opacity: 0.22;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }
    .header p {
      color: var(--ink-light);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
    }
    /* ── Map ── */
    .map-wrap { max-width: 1200px; margin: 0 auto 1.5rem; padding: 0 1rem; }
    #map {
      width: 100%; height: 520px;
      border-radius: 10px;
      box-shadow: 0 4px 20px var(--shadow);
      z-index: 1;
    }
    /* ── Filter ── */
    .filters {
      max-width: 1200px; margin: 0 auto 1.5rem; padding: 0 1rem;
      display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    .filters button {
      padding: 0.4rem 1rem; border-radius: 20px;
      border: 1px solid var(--border); background: var(--card);
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      color: var(--ink-mid); cursor: pointer; transition: all 0.2s;
    }
    .filters button:hover, .filters button.active {
      background: var(--ink); color: #fff; border-color: var(--ink);
    }
    /* ── Cards ── */
    .cards {
      max-width: 1200px; margin: 0 auto; padding: 0 1rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--card); border-radius: 8px;
      padding: 1.25rem 1.4rem; cursor: pointer;
      box-shadow: 0 1px 8px var(--shadow);
      border: 1px solid transparent;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(26,24,23,0.1);
      border-color: var(--border);
    }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.25rem; }
    .card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600; font-size: 1.25rem;
      color: var(--ink); line-height: 1.3;
    }
    .card .hearts { color: var(--accent); font-size: 0.85rem; white-space: nowrap; margin-left: 0.5rem; flex-shrink: 0; }
    .card .note {
      font-size: 0.82rem; color: var(--ink-mid);
      margin-bottom: 0.5rem; line-height: 1.45;
      font-style: italic; font-family: 'Cormorant Garamond', serif;
      font-size: 0.92rem;
    }
    .card .meta {
      display: flex; gap: 0.6rem; flex-wrap: wrap;
      font-size: 0.75rem; color: var(--ink-light);
    }
    .card .meta span { display: inline-flex; align-items: center; gap: 0.2rem; }
    .card .tag {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px;
      background: var(--bg); font-size: 0.7rem; color: var(--ink-mid);
    }
    .card .link {
      display: inline-block; margin-top: 0.7rem;
      font-size: 0.78rem; color: var(--accent);
      text-decoration: none; font-weight: 500;
      letter-spacing: 0.03em; transition: color 0.2s;
    }
    .card .link:hover { color: var(--ink); }
    .card.hidden { display: none; }
    /* ── Leaflet popup ── */
    .leaflet-popup-content-wrapper { border-radius: 6px !important; font-family: 'DM Sans', sans-serif; box-shadow: 0 3px 12px rgba(0,0,0,0.15) !important; }
    .leaflet-popup-content { margin: 10px 14px !important; line-height: 1.4 !important; }
    .p-title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: #1a1817; }
    .p-hearts { color: #d4627a; font-size: 0.8rem; }
    .p-note { font-size: 0.78rem; color: #4a4540; margin-top: 2px; }
    .footer { text-align: center; padding: 1.5rem 1rem 2.5rem; font-size: 0.75rem; color: var(--ink-light); letter-spacing: 0.04em; }
    @media (max-width: 600px) {
      #map { height: 380px; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>

  { name:"Linguini", area:"De Pijp", hearts:0, note:"Eerst drankje bij Bellini, dan hierheen", lat:52.3575,lng:4.8897, web:"", tags:["italiaans","pasta"] },
  { name:"Toscanini", area:"Jordaan", hearts:0, note:"Echt lekker italiaans, wel duur. Favo van Rihanna!", lat:52.3801,lng:4.8854, web:"", tags:["italiaans","\u20ac\u20ac\u20ac"] },
  { name:"Amstel Hotel", area:"Centrum", hearts:4, note:"Alleen lunch! Vragen of je buiten kan zitten", lat:52.3603,lng:4.9050, web:"", tags:["lunch","chic"] },
  { name:"Borello Aperitivo", area:"Zeedijk", hearts:0, note:"AMAAAAAZIE \u2014 cocktails & pizza", lat:52.3754,lng:4.9012, web:"", tags:["cocktails","bar"] },
  { name:"Brasserie de Luwte", area:"Jordaan", hearts:0, note:"Aan de Leliegracht", lat:52.3753,lng:4.8869, web:"", tags:["frans","restaurant"] },
  { name:"Polly Goudvis", area:"Noord", hearts:4, note:"Brunch bij de pont", lat:52.3825,lng:4.9033, web:"", tags:["brunch","bar"] },
  { name:"Tia Rosa", area:"Centrum", hearts:0, note:"Tapas aan de Reguliersgracht", lat:52.3643,lng:4.8963, web:"", tags:["tapas","spaans"] },
  { name:"Roest", area:"Oost", hearts:4, note:"Leuk binnen \u2014 industrieel", lat:52.3720,lng:4.9266, web:"", tags:["bar","industrieel"] },
  { name:"No Nonsense", area:"Centrum", hearts:4, note:"Gezellig bruin caf\u00e9", lat:52.3759,lng:4.9027, web:"", tags:["bar","caf\u00e9"] },
];
// ── Map ──
const map = L.map('map', { scrollWheelZoom: false }).setView([52.3676, 4.9041], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://osm.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 18
}).addTo(map);
// Grayscale filter for that moody Amsterdam vibe
document.querySelector('.leaflet-tile-pane').style.filter = 'saturate(0) contrast(1.1)';
const bounds = [];
const markers = [];
places.forEach((p, i) => {
  const hasHearts = p.hearts > 0;
  const size = hasHearts && p.hearts >= 4 ? 13 : 9;
  const color = hasHearts ? '#d4627a' : '#1a1817';
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 6px rgba(0,0,0,0.3);"></div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2]
  });
  const marker = L.marker([p.lat, p.lng], { icon }).addTo(map);
  const heartStr = p.hearts > 0 ? '\ud83e\ude77'.repeat(p.hearts) : '';
  marker.bindPopup(`
    <div class="p-title">${p.name}</div>
    ${heartStr ? `<div class="p-hearts">${heartStr}</div>` : ''}
    ${p.note ? `<div class="p-note">${p.note}</div>` : ''}
  `, { maxWidth: 220 });
  markers.push(marker);
  bounds.push([p.lat, p.lng]);
});
map.fitBounds(bounds, { padding: [30, 30] });
// ── Filters ──
let activeArea = null;
let activeTag = null;

// Area filters
const allAreas = [...new Set(places.map(p => p.area))].sort();
const areaFiltersEl = document.getElementById('area-filters');
const allAreaBtn = document.createElement('button');
allAreaBtn.textContent = 'Alle wijken';
allAreaBtn.className = 'active';
allAreaBtn.onclick = () => { activeArea = null; applyFilters(); };
areaFiltersEl.appendChild(allAreaBtn);
allAreas.forEach(area => {
  const btn = document.createElement('button');
  btn.textContent = area;
  btn.onclick = () => { activeArea = area; applyFilters(); };
  areaFiltersEl.appendChild(btn);
});

// Tag filters
const allTags = [...new Set(places.flatMap(p => p.tags))].sort();
const tagLabels = { restaurant:'Restaurant', bar:'Bar', tapas:'Tapas', wijn:'Wijn', italiaans:'Italiaans', frans:'Frans', vis:'Vis', oesters:'Oesters', cocktails:'Cocktails', brunch:'Brunch', lunch:'Lunch', terras:'Terras', borrel:'Borrel', ontbijt:'Ontbijt', 'happy hour':'Happy Hour', steak:'Steak', snacks:'Snacks', kaas:'Kaas', pasta:'Pasta', '\u20ac\u20ac\u20ac':'\u20ac\u20ac\u20ac', chic:'Chic' };
const filtersEl = document.getElementById('filters');
const allBtn = document.createElement('button');
allBtn.textContent = 'Alles';
allBtn.className = 'active';
allBtn.onclick = () => { activeTag = null; applyFilters(); };
filtersEl.appendChild(allBtn);
const showTags = ['restaurant','bar','italiaans','frans','tapas','wijn','oesters','vis','cocktails','brunch','lunch','terras','steak','ontbijt','happy hour'];
showTags.forEach(tag => {
  if (!allTags.includes(tag)) return;
  const btn = document.createElement('button');
  btn.textContent = tagLabels[tag] || tag;
  btn.onclick = () => { activeTag = tag; applyFilters(); };
  filtersEl.appendChild(btn);
});

function applyFilters() {
  // Update area button states
  [...areaFiltersEl.children].forEach(b => b.classList.remove('active'));
  if (!activeArea) {
    areaFiltersEl.children[0].classList.add('active');
  } else {
    [...areaFiltersEl.children].find(b => b.textContent === activeArea)?.classList.add('active');
  }
  // Update tag button states
  [...filtersEl.children].forEach(b => b.classList.remove('active'));
  if (!activeTag) {
    filtersEl.children[0].classList.add('active');
  } else {
    [...filtersEl.children].find(b => b.textContent === (tagLabels[activeTag]||activeTag))?.classList.add('active');
  }
  // Filter cards
  document.querySelectorAll('.card').forEach((card, i) => {
    const matchArea = !activeArea || places[i].area === activeArea;
    const matchTag = !activeTag || places[i].tags.includes(activeTag);
    card.classList.toggle('hidden', !(matchArea && matchTag));
  });
}
// ── Cards ──
const cardsEl = document.getElementById('cards');
places.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => {
    map.setView([p.lat, p.lng], 16, { animate: true });
    markers[i].openPopup();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  const heartStr = p.hearts > 0 ? '\ud83e\ude77'.repeat(p.hearts) : '';
  card.innerHTML = `
    <div class="card-top">
      <h3>${p.name}</h3>
      ${heartStr ? `<span class="hearts">${heartStr}</span>` : ''}
    </div>
    ${p.note ? `<div class="note">${p.note}</div>` : ''}
    <div class="meta">
      <span>${p.area}</span>
      ${p.tags.map(t => `<span class="tag">${tagLabels[t]||t}</span>`).join('')}
    </div>
    ${p.web ? `<a class="link" href="${p.web}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Website \u2192</a>` : ''}
  `;
  cardsEl.appendChild(card);
});
</script>
</body>
</html>
